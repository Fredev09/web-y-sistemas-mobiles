<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UCC - Práctica Fetch API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4">Catálogo de Pokémon (Fetch API)</h1>

        <div class="text-center mb-4">
            <button id="btn-cargar" class="btn btn-primary btn-lg">Cargar Datos</button>
        </div>

        <div class="row justify-content-center mb-4">
            <div class="col-md-6">
                <input 
                    type="text" 
                    id="buscador" 
                    class="form-control" 
                    placeholder="Buscar pokemon......."
                >
            </div>
        </div>

        <div id="pokemon-container" class="row row-cols-1 row-cols-md-3 g-4">
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
