<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Formularios</title>
</head>

<body>
  <form>
    <h1>Actividad 1</h1>
    <hr>
    <fieldset>
      <legend>Informacion personal</legend>

      <label for="nombre">Nombre completo:</label>
      <input type="text" id="nombre" name="nombre" required minlength="5">
      <br><br>

      <label for="correo">Correo:</label>
      <input type="email" id="correo" name="correo" required>
      <br><br>

      <label for="edad">Edad:</label>
      <input type="number" id="edad" name="edad" min="18" max="65" required>
      <br><br>

      <label for="comentarios">Comentarios:</label><br>
      <textarea id="comentarios" name="comentarios" minlength="10" required></textarea>
      <br><br>

      <input type="submit" value="Enviar">
    </fieldset>
  </form>

  <form>
    <h1>Actividad 2</h1>
    <hr>
    <fieldset>
      <legend>Formulario de encuesta</legend>

      <h4>Escoge un color</h4>
      <label for="verde">Verde</label>
      <input type="radio" id="verde" name="opcion" value="verde" required><br>

      <label for="rojo">Rojo</label>
      <input type="radio" id="rojo" name="opcion" value="rojo"><br>

      <label for="amarillo">Amarillo</label>
      <input type="radio" id="amarillo" name="opcion" value="amarillo"><br><br>

      <h4>Cuales son tus lenguajes de programacion favoritos?</h4>
      <label for="python">Python</label>
      <input type="checkbox" id="python" name="lenguajeProgramacion" value="python"><br>

      <label for="javascript">Javascript</label>
      <input type="checkbox" id="javascript" name="lenguajeProgramacion" value="javascript"><br>

      <label for="java">Java</label>
      <input type="checkbox" id="java" name="lenguajeProgramacion" value="java"><br>

      <label for="c++">C++</label>
      <input type="checkbox" id="c++" name="lenguajeProgramacion" value="c++"><br>

      <label for="c">C</label>
      <input type="checkbox" id="c" name="lenguajeProgramacion" value="c"><br><br>

      <h4>Selecciona tu nivel de conocimiento en html</h4>
      <label for="nivel">Nivel:</label>
      <select id="nivel" name="nivel" required>
        <option value="">Selecciona una opcion </option>
        <option value="nada">Nada</option>
        <option value="un poco">Un poco</option>
        <option value="intermedio">Intermedio</option>
        <option value="avanzado">Avanzado</option>
      </select>
      <br><br>

      <h4>Observaciones</h4>
      <label for="observaciones">Escribe tus observaciones:</label><br>
      <textarea id="observaciones" name="observaciones" rows="4" cols="40" required minlength="5"></textarea>
      <br><br>

      <input type="submit" value="Enviar encuesta">
    </fieldset>
  </form>

</body>
</html>
